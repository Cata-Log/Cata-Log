[mypy]

# imports https://mypy.readthedocs.io/en/stable/config_file.html#import-discovery
mypy_path = src
packages = cata_log
exclude = (?x)(
    .*docs/.*    # docs
    | .*tools/.*    # tools
    | .*docker/.*    # docker
    | .*venv/.*    # any venv
    | .*_cache/.*
    | .*__pycache__/.*
    | .*test/.*  # type checking in tests is unnecessary
  )
exclude_gitignore = True

# platform https://mypy.readthedocs.io/en/stable/config_file.html#platform-configuration
python_version = 3.14
platform = 'linux'

# untyped https://mypy.readthedocs.io/en/stable/config_file.html#untyped-definitions-and-calls
disallow_untyped_defs = True
check_untyped_defs = True
disallow_untyped_decorators = False

# optional handling https://mypy.readthedocs.io/en/stable/config_file.html#none-and-optional-handling
implicit_optional = False

# warnings https://mypy.readthedocs.io/en/stable/config_file.html#configuring-warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = False
warn_unreachable = True

# strictness https://mypy.readthedocs.io/en/stable/config_file.html#miscellaneous-strictness-flags
allow_redefinition_new = True
local_partial_types = True
disable_error_code = attr-defined
enable_error_code =
  truthy-bool,
  truthy-iterable,
  redundant-expr,
  unused-awaitable,
  ignore-without-code,
  possibly-undefined,
  redundant-self,
  explicit-override,
  unimported-reveal,
  deprecated

strict_equality = True
strict_equality_for_none = True
strict_bytes = True

# error messages https://mypy.readthedocs.io/en/stable/config_file.html#configuring-error-messages
show_error_context = True
show_column_numbers = True
show_error_code_links = True
pretty = True
color_output = True
error_summary = True

# advanced https://mypy.readthedocs.io/en/stable/config_file.html#advanced-options
show_traceback = True

# Reports https://mypy.readthedocs.io/en/stable/config_file.html#report-generation
any_exprs_report = tools/reports/mypy/
cobertura_xml_report = tools/reports/mypy/
html_report = tools/reports/mypy/
linecount_report = tools/reports/mypy/
linecoverage_report = tools/reports/mypy/
lineprecision_report = tools/reports/mypy/

# misc https://mypy.readthedocs.io/en/stable/config_file.html#miscellaneous
warn_unused_configs = True

[mypy-ebooklib.*]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True

[mypy-opds.*]
ignore_missing_imports = True

[mypy-pypdfium2.*]
ignore_missing_imports = True

[mypy-cata_log.providers.*]
disable_error_code=assignment
