services:
  db:
    image: mariadb:latest
    container_name: cata-log-db
    volumes:
      - /path/to/cata-log/mysql:/var/lib/mysql
    environment:
      - MARIADB_DATABASE=cata-log # must match cata-log:DATABASE_NAME
      - MARIADB_USER=user # must match cata-log:DATABASE_USER
      - MARIADB_PASSWORD=db_passwd # must match cata-log:DATABASE_PASSWORD
      - MARIADB_ROOT_PASSWORD=example
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb -u$$MARIADB_USER -p$$MARIADB_PASSWORD -e 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  adminer:
    image: adminer:latest
    container_name: cata-log-adminer
    restart: unless-stopped
    ports:
      - 9999:8080

  cata-log:
    image: cata-log:latest
    container_name: cata-log
    volumes:
      - /path/to/cata-log/storage:/mnt/storage
      - /path/to/cata-log/log:/var/log/cata-log
      - /path/to/cata-log/plugins:/mnt/plugins
    ports:
      - 2424:8000
    environment:
      - CATA_LOG_PASSWORD=testwithdb1234 # gitleaks:allow
      - CATA_LOG_EXTERNAL_DATABASE_URL=mysql+pymysql://user:db_passwd@db/cata-log
    restart: unless-stopped
