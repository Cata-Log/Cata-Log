services:
  db:
    image: mariadb:latest
    container_name: cata-log-db
    volumes:
      - /path/to/cata-log-hub/mysql:/var/lib/mysql
    environment:
      - MARIADB_DATABASE=cata-log # must match cata-log-hub:DATABASE_NAME
      - MARIADB_USER=user # must match cata-log-hub:DATABASE_USER
      - MARIADB_PASSWORD=db_passwd # must match cata-log-hub:DATABASE_PASSWORD
      - MARIADB_ROOT_PASSWORD=example
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 20s
      start_interval: 5s
      interval: 1m
      timeout: 5s
      retries: 3

  cata-log-hub:
    image: cata-log-hub:latest
    container_name: cata-log
    volumes:
      - /path/to/cata-log-hub/storage:/mnt/storage
      - /path/to/cata-log-hub/log:/var/log/cata-log
      - /path/to/cata-log-hub/plugins:/mnt/plugins
    ports:
      - 2424:8000
    environment:
      - CATA_LOG_PASSWORD=testwithdb1234 # gitleaks:allow
      - CATA_LOG_EXTERNAL_DATABASE_URL=mysql+pymysql://user:db_passwd@db/cata-log
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
