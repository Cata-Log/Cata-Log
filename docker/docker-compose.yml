services:
  cata-log:
    image: dacid99/cata-log:latest
    container_name: cata-log
    volumes:
      - /path/to/cata-log/storage:/mnt/storage
      - /path/to/cata-log/db:/mnt/db
      - /path/to/cata-log/log:/var/log/cata-log
    ports:
      - 4848:8000
    environment:
      - USERNAME=admin
      - PASSWORD=SafE_pAs5w0rd # setting no password makes authentication impossible #gitleaks:allow
      - PUBLIC_GET= # set this to make all GET endpoints unprotected
      - REQUEST_TIMEOUT=10
      - MAX_RETRIES=3
      - EXPIRATION_DAYS=14
      - LOG_LEVEL=INFO
      - LOG_FILE_BACKUP_COUNT=10
      - LOG_FILE_MAXSIZE=2097152
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
