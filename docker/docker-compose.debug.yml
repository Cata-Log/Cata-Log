services:
  cata-log-hub:
    image: cata-log-hub:latest
    container_name: cata-log-hub
    volumes:
      - /path/to/cata-log-hub/storage:/mnt/storage
      - /path/to/cata-log-hub/db:/mnt/db
      - /path/to/cata-log-hub/log:/var/log/cata-log
      - /path/to/cata-log-hub/plugins:/mnt/plugins
    ports:
      - 2424:8000
    environment:
      - CATA_LOG_PASSWORD=test1234 # gitleaks:allow
      - CATA_LOG_LOG_LEVEL=DEBUG
      - CATA_LOG_DEV_MODE=True
    restart: unless-stopped
