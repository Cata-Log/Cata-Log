services:
  cata-log:
    image: cata-log:latest
    container_name: cata-log
    volumes:
      - /path/to/cata-log/storage:/mnt/storage
      - /path/to/cata-log/db:/mnt/db
      - /path/to/cata-log/log:/var/log/cata-log
      - /path/to/cata-log/plugins:/mnt/plugins
    ports:
      - 2424:8000
    environment:
      - CATA_LOG_PASSWORD=test1234 # gitleaks:allow
      - CATA_LOG_LOG_LEVEL=DEBUG
      - CATA_LOG_DEV_MODE=True
    restart: unless-stopped
