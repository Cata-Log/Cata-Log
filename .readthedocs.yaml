version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
  apt_packages:
    - python3-dev
  jobs:
    pre_create_environment: # https://docs.readthedocs.com/platform/stable/build-customization.html#install-dependencies-with-uv
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --frozen --group docs
sphinx:
  configuration: docs/conf.py
formats:
  - pdf
  - epub
