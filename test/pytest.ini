[pytest]
pythonpath = ../src
addopts = --capture=no --cov-config=test/.coveragerc --cov --cov-append --cov-context=test --cov-report=term --cov-report=xml --cov-report=html --html=test/reports/report.html --junit-xml=reports/junit.xml --self-contained-html
testpaths = test
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s [%(name)s]: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
